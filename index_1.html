<!DOCTYPE html>
<html lang="ru">
<head>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<title>Расчет компромиссных дивидендов</title>

<style>
body{
  margin:0;
  font-family:'Inter', sans-serif;
  background:#f4f5f7;
  color:#1f2937;
  -webkit-font-smoothing:antialiased;
}

.wrapper{
  width:734px;
  margin:0 auto;
  padding:20px 15px 30px 15px;
  box-sizing:border-box;
  display:flex;
  gap:15px;
  align-items:stretch;
}

/* LEFT PANEL */
.left-panel{
  width:50%;
  background:#fff;
  border-radius:8px;
  padding:15px;
  box-shadow:0 2px 6px rgba(0,0,0,0.08);
  display:flex;
  flex-direction:column;
  justify-content:flex-start;
  box-sizing:border-box;
}

.left-title{
  font-size:16px;
  font-weight:600;
  letter-spacing:-0.2px;
  margin-bottom:14px;
}

.step{
  display:none;
  flex-direction:column;
  gap:8px;
}

.step.active{
  display:flex;
}

.step h3{
  font-size:13px;
  font-weight:600;
  letter-spacing:-0.1px;
  margin:0 0 8px 0;
}

.field-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:6px;
}

.field-row label{
  font-size:12px;
  font-weight:500;
  color:#4b5563;
}

.field-row input{
  width:110px;
  padding:6px 8px;
  font-size:12px;
  border:1px solid #d1d5db;
  border-radius:6px;
  font-family:'Inter', sans-serif;
}

.field-row input:focus{
  outline:none;
  border-color:#1976d2;
}

.nav-buttons{
  display:flex;
  justify-content:space-between;
  margin-top:12px;
}

button{
  padding:7px 14px;
  font-size:12px;
  font-weight:600;
  border:none;
  border-radius:8px;
  cursor:pointer;
  transition:all 0.15s ease;
  font-family:'Inter', sans-serif;
}

button.primary{
  background:#1976d2;
  color:#fff;
  box-shadow:0 2px 6px rgba(25,118,210,0.25);
}

button.primary:hover{
  background:#1565c0;
  box-shadow:0 4px 10px rgba(25,118,210,0.35);
  transform:translateY(-1px);
}

button.primary:active{
  transform:translateY(0);
  box-shadow:0 2px 6px rgba(25,118,210,0.25);
}

button.secondary{
  background:#e5e7eb;
  color:#374151;
}

button.secondary:hover{
  background:#d1d5db;
}

button.secondary:active{
  background:#cbd5e1;
}

/* RIGHT PANEL */
.right-panel{
  width:50%;
  display:flex;
  flex-direction:column;
  box-sizing:border-box;
}

.right-top{
  flex:1;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.result-card{
  background:#fff;
  border-radius:8px;
  padding:15px;
  box-shadow:0 2px 6px rgba(0,0,0,0.08);
  min-height:150px;
}

.result-card .title{
  font-size:16px;
  font-weight:600;
  letter-spacing:-0.2px;
}

.result-main{
  font-size:36px;
  font-weight:800;
  margin-top:10px;
  color:#2e7d32;
  letter-spacing:-0.5px;
}

.range-block{
  margin-top:25px; /* увеличенный отступ перед полосой */
  font-size:12px;
}

.range-line{
  display:flex;
  align-items:center;
  gap:6px;
  margin-bottom:4px;
}

.range-fill{
  height:100%;
  border-radius:6px;
}

.dot{
  width:8px;
  height:8px;
  border-radius:50%;
}

.dot.lower{ background:#1565c0; }
.dot.upper{ background:#c62828; }

.range-bar{
  position:relative;
  height:12px;
  background:#e5e7eb;
  border-radius:4px;
  overflow:hidden;
}

.marker{
  position:absolute;
  top:50%;
  transform:translate(-50%, -50%);
  width:14px;
  height:14px;
  background:#fff;
  border-radius:0%;
}

.marker.lower{ background:#1565c0; }
.marker.upper{
  background:#c62828;
  left:auto;
  right:2%;  /* фиксируем 2% от правого края */
}
.marker.rec{ background:#2e7d32; }

.kpi-row{
  display:flex;
  gap:10px;
}

.kpi{
  flex:1;
  background:#fff;
  border-radius:8px;
  padding:12px;
  box-shadow:0 2px 6px rgba(0,0,0,0.06);
  display:flex;
  flex-direction:column;
  min-height:70px;
}
  
.kpi-title{
  font-size:12px;
  font-weight:500;
  color:#6b7280;
  min-height:28px;
}

.kpi-value{
  font-size:18px;
  font-weight:700;
  margin-top:auto;
  letter-spacing:-0.2px;
}
</style>
</head>

<body>
<div class="wrapper">

<!-- LEFT PANEL -->
<div class="left-panel">
  <div class="left-title">Исходные данные</div>

  <div id="step1" class="step active">
    <h3>Финансовые показатели</h3>
    <div class="field-row"><label>Выручка (S)</label><input type="number" id="revenue"></div>
    <div class="field-row"><label>Себестоимость без амортизации (C)</label><input type="number" id="cost"></div>
    <div class="field-row"><label>Амортизация (DP)</label><input type="number" id="depr"></div>
    <div class="field-row"><label>Эффективная ставка налога (T)</label><input type="number" id="tax"></div>
    <div class="nav-buttons">
      <button class="secondary" disabled>Назад</button>
      <button class="primary" onclick="nextStep(2)">Вперед</button>
    </div>
  </div>

  <div id="step2" class="step">
    <h3>Балансовые драйверы</h3>
    <div class="field-row"><label>Внеоборотные активы<br>(на начало периода)</label><input type="number" id="faStart"></div>
    <div class="field-row"><label>Внеоборотные активы<br>(на конец периода)</label><input type="number" id="faEnd"></div>
    <div class="field-row"><label>Рабочий капитал<br>(на начало периода)</label><input type="number" id="wcStart"></div>
    <div class="field-row"><label>Рабочий капитал<br>(на конец периода)</label><input type="number" id="wcEnd"></div>
    <div class="field-row"><label>Денежные средства<br>(факт)</label><input type="number" id="cash"></div>
    <div class="field-row"><label>Норматив ликвидности<br>(сумма)</label><input type="number" id="liqFloor"></div>
    <div class="nav-buttons">
      <button class="secondary" onclick="nextStep(1)">Назад</button>
      <button class="primary" onclick="nextStep(3)">Вперед</button>
    </div>
  </div>

  <div id="step3" class="step">
    <h3>Политика</h3>
    <div class="field-row"><label>Обязательные инвестиции<br>(% от CAPEX)</label><input type="number" id="invPercent" step="0.1"></div>
    <div class="field-row"><label>Долговая нагрузка<br>(% от FCF)</label><input type="number" id="debtPercent" step="0.1"></div>
    <div class="field-row"><label>Минимальный дивиденд<br>(% от ЧП)</label><input type="number" id="minDividendPercent" step="0.1"></div>
    <div class="field-row"><label>Коэффициент распределения (k)</label><input type="number" id="kCoef" step="0.1"></div>
    <div class="nav-buttons">
      <button class="secondary" onclick="nextStep(2)">Назад</button>
      <button class="primary">Готово</button>
    </div>
  </div>
</div>

<!-- RIGHT PANEL -->
<div class="right-panel">
  <div class="right-top">
    <div class="result-card">
      <div class="title">Рекомендуемый размер дивидендов</div>
      <div id="recDividendVal" class="result-main">0</div>

      <div class="range-block">
        <div class="range-line">
          <div class="dot lower"></div>
          <div>Нижняя граница: <span id="lowerVal">0</span></div>
        </div>
        <div class="range-line">
          <div class="dot upper"></div>
          <div>Верхняя граница: <span id="upperVal">0</span></div>
        </div>
        <div class="range-bar">
          <div id="lowerMarker" class="marker lower"></div>
          <div id="recMarker" class="marker rec"></div>
          <div id="upperMarker" class="marker upper"></div>
        </div>
      </div>
    </div>

    <div class="kpi-row">
      <div class="kpi">
        <div class="kpi-title">Чистая прибыль</div>
        <div id="netProfitVal" class="kpi-value">0</div>
      </div>
      <div class="kpi">
        <div class="kpi-title">FCF</div>
        <div id="fcfVal" class="kpi-value">0</div>
      </div>
      <div class="kpi">
        <div class="kpi-title">Доступный FCF</div>
        <div id="fcfAvailVal" class="kpi-value">0</div>
      </div>
    </div>
  </div>
</div>

</div>

<script>
function nextStep(n){
  document.querySelectorAll(".step").forEach(s=>s.classList.remove("active"));
  document.getElementById("step"+n).classList.add("active");
}

function get(id){ return parseFloat(document.getElementById(id).value)||0; }
function format(n){ return n.toLocaleString("ru-RU",{maximumFractionDigits:2}); }
function clampPercent(p){ return Math.min(98, Math.max(2, p)); }

function updateDashboard(){
  const revenue=get("revenue"), cost=get("cost"), depr=get("depr"), tax=get("tax");
  const faStart=get("faStart"), faEnd=get("faEnd"), wcStart=get("wcStart"), wcEnd=get("wcEnd"), cash=get("cash"), liqFloor=get("liqFloor");
  const invPercent=get("invPercent"), debtPercent=get("debtPercent"), minDividendPercent=get("minDividendPercent"), kCoef=get("kCoef");

  const profitBeforeTax=revenue-cost-depr;
  const netProfit=profitBeforeTax*(1-tax);

  const deltaWC=wcEnd-wcStart;
  const capex=faEnd-faStart;

  const fcf=netProfit+depr-deltaWC-capex;

  const liquidityReserve=Math.max(0,liqFloor-cash);
  const mandatoryInvestments=Math.abs(capex)*invPercent;
  const debtLoad=fcf*debtPercent;

  const fcfAvailable=fcf-liquidityReserve-mandatoryInvestments-debtLoad;

  const lowerBound=netProfit*minDividendPercent;
  const upperBound=fcfAvailable;

  const recDividend=Math.max(Math.min(fcfAvailable, fcfAvailable*kCoef), lowerBound);

  document.getElementById("netProfitVal").innerText=format(netProfit);
  document.getElementById("fcfVal").innerText=format(fcf);
  document.getElementById("fcfAvailVal").innerText=format(fcfAvailable);
  document.getElementById("recDividendVal").innerText=format(recDividend);
  document.getElementById("lowerVal").innerText=format(lowerBound);
  document.getElementById("upperVal").innerText=format(upperBound);

  const safeUpper = upperBound || 1;

  document.getElementById("lowerMarker").style.left = clampPercent(lowerBound/safeUpper*100) + "%";
  document.getElementById("recMarker").style.left = clampPercent(recDividend/safeUpper*100) + "%";
  document.getElementById("upperMarker").style.left = "auto";      // фиксируем через right
  document.getElementById("upperMarker").style.right = "2%";
}

document.querySelectorAll("input").forEach(el=>{
  el.addEventListener("input",updateDashboard);
});
</script>

</body>
</html>
